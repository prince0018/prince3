<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 675" role="img" aria-labelledby="title desc">
  <title id="title">OSI model seven layers</title>
  <desc id="desc">A simple seven-layer OSI model diagram from physical layer up to application layer.</desc>
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#f7fbff" />
      <stop offset="100%" stop-color="#dff2ff" />
    </linearGradient>
    <linearGradient id="blue" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#0078d4" />
      <stop offset="100%" stop-color="#004578" />
    </linearGradient>
    <filter id="shadow" color-interpolation-filters="sRGB" filterUnits="userSpaceOnUse" height="180%" width="180%" x="-40%" y="-40%">
      <feDropShadow dx="0" dy="18" flood-color="#004e92" flood-opacity="0.16" stdDeviation="24" />
    </filter>
  </defs>

  <rect width="1200" height="675" fill="url(#bg)" rx="36" />
  <circle cx="1030" cy="120" r="160" fill="#8cc8ff" opacity="0.25" />
  <circle cx="145" cy="585" r="175" fill="#b9dcff" opacity="0.35" />

  <text fill="#0f172a" font-family="Aptos, Segoe UI, sans-serif" font-size="56" font-weight="800" x="78" y="102">
    OSI Model
  </text>
  <text fill="#4b6478" font-family="Aptos, Segoe UI, sans-serif" font-size="24" x="82" y="148">
    A seven-layer mental model for understanding how network communication is organized.
  </text>

  <g filter="url(#shadow)">
    <rect fill="#ffffff" height="426" rx="32" width="1040" x="80" y="205" />

    <g font-family="Aptos, Segoe UI, sans-serif">
      <g transform="translate(150 255)">
        <rect fill="url(#blue)" height="50" rx="16" width="900" />
        <text fill="#ffffff" font-size="21" font-weight="800" x="24" y="32">7. Application</text>
        <text fill="#dff2ff" font-size="17" text-anchor="end" x="874" y="32">Apps, browsers, APIs</text>
      </g>
      <g transform="translate(150 307)">
        <rect fill="#eff8ff" height="50" rx="16" width="900" />
        <text fill="#005a9e" font-size="21" font-weight="800" x="24" y="32">6. Presentation</text>
        <text fill="#24435c" font-size="17" text-anchor="end" x="874" y="32">Encoding, encryption, formats</text>
      </g>
      <g transform="translate(150 359)">
        <rect fill="#dff2ff" height="50" rx="16" width="900" />
        <text fill="#005a9e" font-size="21" font-weight="800" x="24" y="32">5. Session</text>
        <text fill="#24435c" font-size="17" text-anchor="end" x="874" y="32">Connections and sessions</text>
      </g>
      <g transform="translate(150 411)">
        <rect fill="url(#blue)" height="50" rx="16" width="900" />
        <text fill="#ffffff" font-size="21" font-weight="800" x="24" y="32">4. Transport</text>
        <text fill="#dff2ff" font-size="17" text-anchor="end" x="874" y="32">TCP, UDP, ports, reliability</text>
      </g>
      <g transform="translate(150 463)">
        <rect fill="#eff8ff" height="50" rx="16" width="900" />
        <text fill="#005a9e" font-size="21" font-weight="800" x="24" y="32">3. Network</text>
        <text fill="#24435c" font-size="17" text-anchor="end" x="874" y="32">IP addresses and routing</text>
      </g>
      <g transform="translate(150 515)">
        <rect fill="#dff2ff" height="50" rx="16" width="900" />
        <text fill="#005a9e" font-size="21" font-weight="800" x="24" y="32">2. Data Link</text>
        <text fill="#24435c" font-size="17" text-anchor="end" x="874" y="32">Frames, MAC addresses, switches</text>
      </g>
      <g transform="translate(150 567)">
        <rect fill="url(#blue)" height="50" rx="16" width="900" />
        <text fill="#ffffff" font-size="21" font-weight="800" x="24" y="32">1. Physical</text>
        <text fill="#dff2ff" font-size="17" text-anchor="end" x="874" y="32">Cables, radio, electrical signals</text>
      </g>
    </g>
  </g>
</svg>
