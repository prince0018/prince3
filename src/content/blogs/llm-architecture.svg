<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 675" role="img" aria-labelledby="title desc">
  <title id="title">How a large language model processes text</title>
  <desc id="desc">A visual flow showing text becoming tokens, tokens becoming vectors, attention mixing context, neural layers refining meaning, and probabilities producing the next token.</desc>
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#f7fbff" />
      <stop offset="100%" stop-color="#dff2ff" />
    </linearGradient>
    <linearGradient id="blue" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#0078d4" />
      <stop offset="100%" stop-color="#004578" />
    </linearGradient>
    <linearGradient id="soft" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#eff8ff" />
      <stop offset="100%" stop-color="#b9dcff" />
    </linearGradient>
    <filter id="shadow" color-interpolation-filters="sRGB" filterUnits="userSpaceOnUse" height="180%" width="180%" x="-40%" y="-40%">
      <feDropShadow dx="0" dy="18" flood-color="#004e92" flood-opacity="0.16" stdDeviation="24" />
    </filter>
  </defs>

  <rect width="1200" height="675" fill="url(#bg)" rx="36" />
  <circle cx="1040" cy="100" r="145" fill="#8cc8ff" opacity="0.28" />
  <circle cx="150" cy="600" r="180" fill="#b9dcff" opacity="0.32" />

  <text fill="#0f172a" font-family="Aptos, Segoe UI, sans-serif" font-size="54" font-weight="800" x="78" y="102">
    How LLMs Work
  </text>
  <text fill="#4b6478" font-family="Aptos, Segoe UI, sans-serif" font-size="24" x="82" y="146">
    Language becomes numbers, context gets mixed, and the model predicts the next token.
  </text>

  <g filter="url(#shadow)">
    <rect fill="#ffffff" height="390" rx="32" width="1040" x="80" y="205" />

    <g transform="translate(126 267)">
      <rect fill="url(#soft)" height="92" rx="22" width="154" />
      <text fill="#005a9e" font-family="Aptos, Segoe UI, sans-serif" font-size="22" font-weight="800" text-anchor="middle" x="77" y="40">Text</text>
      <text fill="#24435c" font-family="Aptos, Segoe UI, sans-serif" font-size="14" text-anchor="middle" x="77" y="65">"The cat sat"</text>
    </g>

    <g transform="translate(316 267)">
      <rect fill="url(#blue)" height="92" rx="22" width="154" />
      <text fill="#ffffff" font-family="Aptos, Segoe UI, sans-serif" font-size="22" font-weight="800" text-anchor="middle" x="77" y="40">Tokens</text>
      <text fill="#dff2ff" font-family="Aptos, Segoe UI, sans-serif" font-size="14" text-anchor="middle" x="77" y="65">small pieces</text>
    </g>

    <g transform="translate(506 267)">
      <rect fill="url(#soft)" height="92" rx="22" width="154" />
      <text fill="#005a9e" font-family="Aptos, Segoe UI, sans-serif" font-size="22" font-weight="800" text-anchor="middle" x="77" y="40">Vectors</text>
      <text fill="#24435c" font-family="Aptos, Segoe UI, sans-serif" font-size="14" text-anchor="middle" x="77" y="65">meaning as numbers</text>
    </g>

    <g transform="translate(696 267)">
      <rect fill="url(#blue)" height="92" rx="22" width="154" />
      <text fill="#ffffff" font-family="Aptos, Segoe UI, sans-serif" font-size="22" font-weight="800" text-anchor="middle" x="77" y="40">Attention</text>
      <text fill="#dff2ff" font-family="Aptos, Segoe UI, sans-serif" font-size="14" text-anchor="middle" x="77" y="65">mixes context</text>
    </g>

    <g transform="translate(886 267)">
      <rect fill="url(#soft)" height="92" rx="22" width="154" />
      <text fill="#005a9e" font-family="Aptos, Segoe UI, sans-serif" font-size="22" font-weight="800" text-anchor="middle" x="77" y="40">Next Token</text>
      <text fill="#24435c" font-family="Aptos, Segoe UI, sans-serif" font-size="14" text-anchor="middle" x="77" y="65">probability list</text>
    </g>

    <g fill="none" stroke="#0078d4" stroke-linecap="round" stroke-width="7">
      <path d="M288 313h20" />
      <path d="M478 313h20" />
      <path d="M668 313h20" />
      <path d="M858 313h20" />
    </g>

    <g transform="translate(190 430)">
      <rect fill="#eff8ff" height="96" rx="24" width="820" />
      <text fill="#005a9e" font-family="Aptos, Segoe UI, sans-serif" font-size="22" font-weight="800" text-anchor="middle" x="410" y="39">Core intuition</text>
      <text fill="#24435c" font-family="Aptos, Segoe UI, sans-serif" font-size="18" text-anchor="middle" x="410" y="70">Each layer refines token vectors, then the model scores likely next tokens.</text>
    </g>
  </g>
</svg>
